<div class="page-container">
    <div class="header-actions">
        <h2>User Management</h2>
        <div class="actions">
            <input type="text" placeholder="Search Users..." (input)="onSearch($event)" class="search-box"
                *ngIf="!showForm">
            <button class="btn-primary" (click)="toggleForm()" *ngIf="!showForm">+ Add New User</button>
        </div>
    </div>

    <!-- User List -->
    <div class="table-container" *ngIf="!showForm">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>User Type</th>
                    <th>Status</th>
                    <th>Edit</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of filteredUsers">
                    <td>{{ user.name }}</td>
                    <td>{{ user.roleName }}</td>
                    <td>{{ user.emailId }}</td>
                    <td>{{ user.mobileNumber }}</td>
                    <td>{{ user.roleName }}</td>
                    <td>
                        <span class="status-badge" [class.active]="user.active">{{ user.active ? 'Active' : 'Inactive'
                            }}</span>
                    </td>
                    <td>
                        <button class="btn-link" (click)="onEdit(user)">Edit</button>
                    </td>
                </tr>
                <tr *ngIf="filteredUsers.length === 0">
                    <td colspan="7" class="no-data">No users found.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add User Form -->
    <div class="form-container" *ngIf="showForm">
        <div class="form-header">
            <h3>{{ isEditing ? 'Edit User' : 'Register New User' }}</h3>
            <button class="btn-text" (click)="toggleForm()">Back to List</button>
        </div>

        <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="form-grid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" formControlName="name" placeholder="Enter Name">
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select formControlName="role">
                        <option value="" disabled selected>Select Role</option>
                        <option *ngFor="let role of roles" [value]="role.role_id">{{ role.role_desc }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email Id</label>
                    <input type="email" formControlName="email" placeholder="Enter Email">
                </div>

                <div class="form-group">
                    <label>Mobile No</label>
                    <input type="text" formControlName="mobile" placeholder="Enter Mobile No">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" formControlName="password" placeholder="Enter Password">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" formControlName="confirmPassword" placeholder="Confirm Password">
                </div>


                <div class="form-group">
                    <label>Status</label>
                    <input type="text" formControlName="status" placeholder="Enter Status (e.g. Active)">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="toggleForm()">Cancel</button>
                <button type="submit" class="btn-submit" [disabled]="userForm.invalid">{{ isEditing ? 'Update' : 'Save'
                    }} User</button>
            </div>
        </form>
    </div>
</div>
